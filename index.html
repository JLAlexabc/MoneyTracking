<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f6b63">
    <meta name="description" content="生活开销记录、票据识别、分类统计与数据分析">
    <title>拾账 - 生活开销分析</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css?v=26">
  </head>
  <body>
    <section class="auth-screen" id="authScreen">
      <div class="auth-card">
        <p class="eyebrow">多用户本地账本</p>
        <h1>拾账</h1>
        <p class="auth-copy">输入你的独特密码进入账本。新用户先设置密码创建独立账本。</p>
        <div class="segmented auth-segmented" role="tablist" aria-label="进入方式">
          <button type="button" class="active" data-auth-mode="login">进入账本</button>
          <button type="button" data-auth-mode="create">新建账本</button>
        </div>
        <form id="authForm" class="auth-form">
          <label>
            <span>账本密码</span>
            <input id="authPassword" type="password" autocomplete="current-password" minlength="4" placeholder="输入一串只有你知道的密码" required>
          </label>
          <button class="primary-button" type="submit" id="authSubmit">进入账本</button>
          <small id="authMessage">数据保存在当前浏览器，本网站不会上传你的密码。</small>
        </form>
      </div>
    </section>

    <div class="app-shell" id="appShell" hidden>
      <header class="topbar">
        <div>
          <p class="eyebrow">个人生活开销</p>
          <h1>拾账</h1>
        </div>
        <div class="top-actions">
          <div class="month-switcher" aria-label="月份筛选">
            <button class="icon-button" type="button" id="prevMonth" aria-label="上个月">‹</button>
            <button class="month-button" type="button" id="currentMonth"></button>
            <button class="icon-button" type="button" id="nextMonth" aria-label="下个月">›</button>
          </div>
          <button class="secondary-button" type="button" id="lockApp">切换用户</button>
          <button class="primary-button add-toggle" type="button" id="openEntry">添加开销</button>
        </div>
      </header>

      <main>
        <section class="dashboard-grid" aria-label="月度开销概览">
          <article class="hero-metric">
            <div class="hero-copy">
              <span>当前月份开销</span>
              <strong id="totalSpent">$0.00</strong>
              <small id="monthHint">暂无记录</small>
            </div>
            <div class="quick-stats">
              <div>
                <span>日均</span>
                <strong id="dailyAverage">$0.00</strong>
                <small id="dailyHint">按已发生日期计算</small>
              </div>
              <div>
                <span>最大类别</span>
                <strong id="topCategory">-</strong>
                <small id="topCategoryHint">等待分类数据</small>
              </div>
              <div>
                <span>记录</span>
                <strong id="entryCount">0</strong>
                <small id="entryHint">手动与图片识别</small>
              </div>
            </div>
          </article>

          <div class="panel chart-panel">
            <div class="panel-heading compact">
              <div>
                <h2>分类结构</h2>
                <p id="categorySummary">暂无数据</p>
              </div>
            </div>
            <div class="chart-wrap">
              <canvas id="donutChart" width="360" height="360" aria-label="分类支出环形图"></canvas>
              <div class="chart-center">
                <span>合计</span>
                <strong id="donutTotal">$0</strong>
              </div>
              <div class="chart-tooltip" id="donutTooltip" hidden></div>
            </div>
            <div class="legend" id="categoryLegend"></div>
          </div>

          <div class="panel trend-panel">
            <div class="panel-heading compact">
              <div>
                <h2>年度总结</h2>
                <p id="trendInsight">记录开销后会生成年度概览。</p>
              </div>
            </div>
            <canvas id="trendChart" height="220" aria-label="年度月度支出总结图"></canvas>
          </div>
        </section>

        <section class="entry-drawer" id="entryDrawer" hidden>
          <div class="panel entry-panel">
            <div class="panel-heading">
              <div>
                <h2>记录开销</h2>
                <p>手动输入，或从小票/信用卡截图自动提取交易。</p>
              </div>
              <div class="entry-heading-actions">
                <div class="segmented" role="tablist" aria-label="录入方式">
                  <button type="button" class="active" data-entry-mode="manual">手动</button>
                  <button type="button" data-entry-mode="receipt">图片</button>
                </div>
                <button type="button" class="icon-button close-entry" id="closeEntry" aria-label="关闭录入">×</button>
              </div>
            </div>

            <form id="expenseForm" class="expense-form">
              <div class="receipt-tools" id="receiptTools" hidden>
                <label class="receipt-drop">
                  <input id="receiptInput" type="file" accept="image/*,.heic,.heif,image/heic,image/heif" capture="environment">
                  <span class="camera-mark">◎</span>
                  <strong>拍照或上传小票/账单截图</strong>
                  <small id="ocrStatus">支持 JPG、PNG、HEIC，并可拆分信用卡流水</small>
                </label>
                <img id="receiptPreview" class="receipt-preview" alt="小票预览" hidden>
                <textarea id="ocrText" placeholder="识别出的文字会出现在这里，也可以粘贴信用卡截图文字辅助拆分"></textarea>
                <div class="receipt-items-preview" id="receiptItemsPreview" hidden>
                  <strong id="receiptItemsTitle">识别到的商品</strong>
                  <div id="receiptItemsList"></div>
                </div>
                <div class="import-preview" id="importPreview" hidden>
                  <div class="import-preview-heading">
                    <strong id="importPreviewTitle">识别到的交易</strong>
                    <button type="button" class="secondary-button" id="importAll">全部导入</button>
                  </div>
                  <div class="import-list" id="importList"></div>
                </div>
                <button type="button" class="secondary-button" id="parseOcr">解析图片文字</button>
              </div>

              <div class="field-row">
                <label>
                  <span>金额</span>
                  <input id="amount" name="amount" type="number" min="0" step="0.01" inputmode="decimal" placeholder="32.50" required>
                </label>
                <label>
                  <span>日期</span>
                  <input id="date" name="date" type="date" required>
                </label>
              </div>

              <label>
                <span>类别</span>
                <select id="category" name="category" required></select>
              </label>

              <label>
                <span>商家或备注</span>
                <input id="merchant" name="merchant" type="text" placeholder="Whole Foods / 午餐 / 地铁">
              </label>

              <label>
                <span>说明</span>
                <textarea id="note" name="note" placeholder="可选：和朋友聚餐、家庭采购、报销待处理等"></textarea>
              </label>

              <button class="primary-button" type="submit" id="submitExpense">添加记录</button>
            </form>
          </div>
        </section>

        <section class="panel category-detail-panel" id="categoryDetail" hidden>
          <div class="panel-heading records-heading">
            <div>
              <h2 id="categoryDetailTitle">分类明细</h2>
              <p id="categoryDetailSummary">点击分类结构中的项目查看详情。</p>
            </div>
            <button type="button" class="secondary-button" id="closeCategoryDetail">关闭</button>
          </div>
          <div class="category-detail-grid">
            <div class="detail-chart-wrap">
              <canvas id="categoryDetailChart" height="240" aria-label="分类内消费记录金额图"></canvas>
              <div class="chart-tooltip detail-tooltip" id="categoryDetailTooltip" hidden></div>
            </div>
            <div class="detail-stats" id="categoryDetailStats"></div>
          </div>
          <div class="records-list compact-records" id="categoryDetailRecords"></div>
        </section>

        <section class="analytics-grid">
          <div class="panel insight-panel">
            <div class="panel-heading compact">
              <div>
                <h2>洞察</h2>
                <p>根据当月数据自动归纳。</p>
              </div>
            </div>
            <div id="insightList" class="insight-list"></div>
          </div>
        </section>

        <section class="panel records-panel">
          <div class="panel-heading records-heading">
            <div>
              <h2>交易明细</h2>
              <p id="recordSummary">所有记录保存在本机浏览器。</p>
            </div>
            <div class="record-actions">
              <button type="button" class="secondary-button" id="seedDemo">示例数据</button>
              <button type="button" class="secondary-button danger" id="clearAll">清空</button>
            </div>
          </div>
          <div class="records-list" id="recordsList"></div>
        </section>
      </main>
    </div>

    <template id="recordTemplate">
      <article class="record-item">
        <div class="record-icon"></div>
        <div class="record-main">
          <strong></strong>
          <span></span>
        </div>
        <div class="record-side">
          <strong></strong>
          <button type="button" aria-label="删除记录">×</button>
        </div>
      </article>
    </template>

    <script src="app.js?v=26"></script>
  </body>
</html>
